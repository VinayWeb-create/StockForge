services:
  - type: web
    name: stockforge-api
    runtime: python
    runtimeVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
    deploy:
      branch: main
